name: radi_right
description: "RadiRight - Helping doctors choose appropriate radiological exams based on ACR Appropriateness Criteria"
publish_to: "none"

version: 0.0.1+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  flutter_screenutil: ^5.9.3
  flutter_svg: ^2.0.16
  flutter_animate: ^4.5.0
  hugeicons: ^1.1.5

  # State Management
  flutter_hooks: ^0.21.0
  hooks_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.0.0

  # Code Generation
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Networking
  dio: ^5.4.0

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.3
  cloud_firestore: ^5.6.7

  # Storage
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.2.0

  # Functional Programming
  fpdart: ^1.1.0

  # Internationalization
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation
  build_runner: ^2.4.0
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.6.3

  # Linting
  flutter_lints: ^5.0.0

  # App icons (light + dark with surface background)
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/data/
    - assets/data/decision_trees/
    - assets/logos/

# App icons: light logo on surfaceLight (#F8F9FA), dark logo on surfaceDark (#0E1515).
# Run: dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon_light.png"
  # iOS 18+ dark appearance: use transparent asset (Apple recommendation)
  image_path_ios_dark_transparent: "assets/icon/icon_dark.png"
  remove_alpha_ios: false
  adaptive_icon_background: "#F8F9FA"
  adaptive_icon_foreground: "assets/icon/icon_light.png"
  adaptive_icon_foreground_inset: 16